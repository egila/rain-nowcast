name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=custom_components.rain_nowcast --cov-report=term-missing
